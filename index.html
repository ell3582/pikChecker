<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Marker 2026</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 pb-20 font-sans">

<div id="app" v-cloak class="max-w-md mx-auto p-4">
    
    <header class="mb-6 sticky top-0 bg-slate-50/95 backdrop-blur-md py-4 z-20 border-b border-slate-200">
        <div class="flex justify-between items-center px-1">
            <h1 class="text-xl font-black text-green-600 tracking-tighter italic">PIKMIN MARKER</h1>
            
            <div class="flex gap-2">
                <button v-if="!isShareMode" @click="generateShareLink" 
                        class="w-9 h-9 flex items-center justify-center rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 transition-colors shadow-sm" title="分享我的收藏">
                    <span class="text-sm">🔗</span>
                </button>
                
                <button v-if="!isShareMode" @click="resetData" 
                        class="w-9 h-9 flex items-center justify-center rounded-full bg-slate-200 text-slate-500 hover:bg-red-100 hover:text-red-500 transition-colors shadow-sm">
                    <span class="text-lg font-bold">↺</span>
                </button>

                <button v-if="isShareMode" @click="exitShareMode" 
                        class="px-4 h-9 flex items-center justify-center rounded-full bg-orange-500 text-white text-xs font-bold shadow-md hover:bg-orange-600 transition-all">
                    返回我的收藏
                </button>
            </div>
        </div>

        <div v-if="isShareMode" class="mt-3 bg-blue-600 text-white text-[11px] py-1.5 px-3 rounded-lg text-center font-bold animate-pulse">
            👀 正在查看朋友的收藏（唯讀模式）
        </div>
        
        <div class="mt-4 bg-slate-200 rounded-full h-2.5 w-full overflow-hidden shadow-inner">
            <div class="bg-gradient-to-r from-green-400 to-green-600 h-full transition-all duration-700 ease-out" 
                 :style="{ width: progress + '%' }"></div>
        </div>
        <div class="flex justify-between text-[10px] mt-2 text-slate-500 font-black uppercase tracking-widest px-1">
            <span>Progress: {{ ownedCount }} / {{ totalCount }}</span>
            <span class="text-green-600 font-bold">{{ progress }}%</span>
        </div>
    </header>

    <div v-for="(category, cIdx) in decorData" :key="cIdx" 
         class="mb-4 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        
        <div class="px-4 py-2.5 flex justify-between items-center bg-slate-50/50 border-b border-slate-50">
            <div class="flex items-center gap-2">
                <span class="text-lg">{{ category.icon }}</span>
                <h2 class="font-bold text-sm text-slate-700 tracking-tight">{{ category.name }}</h2>
            </div>
            <span class="text-[11px] font-black text-slate-300">
                {{ getCategoryOwnedCount(category) }} / {{ category.colors.length }}
            </span>
        </div>
        
        <div class="p-4 flex flex-wrap gap-4 justify-start">
            <div v-for="colorId in category.colors" :key="colorId"
                 @click="togglePikmin(category.name, colorId)"
                 class="flex flex-col items-center cursor-pointer w-10">
                
                <div class="w-9 h-9 rounded-full shadow-sm border-2 pikmin-dot flex items-center justify-center relative"
                     :class="[getColorData(colorId).bg, getStateClass(category.name, colorId)]">
                     
                     <span v-if="getState(category.name, colorId) === 2" 
                           class="text-xs font-black"
                           :class="colorId === 'white' ? 'text-slate-900' : 'text-white'">
                        ✓
                     </span>
                </div>
                
                <span class="text-[9px] mt-2 font-black transition-colors" 
                      :class="getState(category.name, colorId) > 0 ? 'text-slate-700' : 'text-slate-300'">
                    {{ getColorData(colorId).label }}
                </span>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
